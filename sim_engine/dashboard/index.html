<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Delta — Physics Dashboard</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;500;600&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap');

  :root {
    --bg:       #070910;
    --surface:  #0d1117;
    --surface2: #111520;
    --border:   #1e2433;
    --border2:  #2a3347;
    --text:     #cdd6f4;
    --text2:    #6b7899;
    --text3:    #3d4a66;
    --pass:     #a6e3a1;
    --warn:     #f9e2af;
    --fail:     #f38ba8;
    --skip:     #45475a;
    --blue:     #89b4fa;
    --purple:   #cba6f7;
    --teal:     #94e2d5;
    --mono:     'IBM Plex Mono', monospace;
    --sans:     'IBM Plex Sans', sans-serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: var(--mono); font-size: 12px; min-height: 100vh; }

  /* ── Config Panel ── */
  #config-panel {
    position: fixed; inset: 0; z-index: 100;
    background: var(--bg);
    display: flex; align-items: center; justify-content: center;
  }
  .config-box {
    background: #09090b;
    border: 1px solid var(--border2);
    border-radius: 12px;
    padding: 40px;
    width: 460px;
    max-width: 90vw;
  }
  .config-box h1 {
    font-family: var(--mono);
    font-size: 18px;
    font-weight: 600;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--blue);
    margin-bottom: 6px;
  }
  .config-box .sub {
    color: var(--text2);
    font-size: 11px;
    margin-bottom: 28px;
    letter-spacing: 0.5px;
  }
  .field { margin-bottom: 16px; }
  .field label { display: block; color: var(--text2); font-size: 10px; text-transform: uppercase; letter-spacing: 1.5px; margin-bottom: 6px; }
  .field input {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border2);
    border-radius: 6px;
    color: var(--text);
    font-family: var(--mono);
    font-size: 12px;
    padding: 10px 14px;
    outline: none;
    transition: border-color 0.2s;
  }
  .field input:focus { border-color: var(--blue); }
  .connect-btn {
    width: 100%;
    background: var(--blue);
    color: var(--bg);
    border: none;
    border-radius: 6px;
    font-family: var(--mono);
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 1px;
    text-transform: uppercase;
    padding: 12px;
    cursor: pointer;
    margin-top: 8px;
    transition: opacity 0.2s;
  }
  .connect-btn:hover { opacity: 0.85; }
  .error-msg { color: var(--fail); font-size: 11px; margin-top: 10px; display: none; }

  /* ── Main Layout ── */
  #app { display: none; }

  header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 8px 24px;
    display: flex; align-items: center; justify-content: space-between;
    position: sticky; top: 0; z-index: 10;
  }
  .header-left { display: flex; align-items: center; gap: 16px; }
  .logo { font-size: 14px; font-weight: 600; letter-spacing: 3px; color: var(--blue); text-transform: uppercase; }.logo img{height:48px !important;width:auto !important;}
  .logo span { color: var(--text2); font-weight: 300; }
  .header-right { display: flex; align-items: center; gap: 12px; }
  .refresh-btn {
    background: var(--surface2);
    border: 1px solid var(--border2);
    color: var(--text2);
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 1px;
    padding: 6px 14px;
    border-radius: 4px;
    cursor: pointer;
    text-transform: uppercase;
    transition: all 0.2s;
  }
  .refresh-btn:hover { border-color: var(--blue); color: var(--blue); }
  .last-updated { color: var(--text3); font-size: 10px; }

  /* ── Stats Bar ── */
  .stats-bar {
    background: var(--surface2);
    border-bottom: 1px solid var(--border);
    padding: 16px 24px;
    display: flex; gap: 32px; align-items: center; flex-wrap: wrap;
  }
  .stat { display: flex; flex-direction: column; gap: 3px; }
  .stat .val { font-size: 28px; font-weight: 600; line-height: 1; }
  .stat .lbl { font-size: 9px; color: var(--text2); text-transform: uppercase; letter-spacing: 1.5px; }
  .stat.pass .val { color: var(--pass); }
  .stat.warn .val { color: var(--warn); }
  .stat.fail .val { color: var(--fail); }
  .stat.blue .val { color: var(--blue); }
  .stat.purple .val { color: var(--purple); }
  .divider { width: 1px; height: 40px; background: var(--border); }

  /* ── Main Content ── */
  .content { display: grid; grid-template-columns: 300px 1fr; height: calc(100vh - 120px); }

  /* ── Sidebar ── */
  .sidebar {
    background: var(--surface);
    border-right: 1px solid var(--border);
    overflow-y: auto;
    padding: 16px 0;
  }
  .sidebar-title {
    font-size: 9px; text-transform: uppercase; letter-spacing: 2px;
    color: var(--text3); padding: 0 16px 12px; border-bottom: 1px solid var(--border);
    margin-bottom: 8px;
  }
  .idea-item {
    padding: 12px 16px;
    cursor: pointer;
    border-left: 2px solid transparent;
    transition: all 0.15s;
    border-bottom: 1px solid var(--border);
  }
  .idea-item:hover { background: var(--surface2); }
  .idea-item.active { background: var(--surface2); border-left-color: var(--blue); }
  .idea-title { font-size: 11px; line-height: 1.4; margin-bottom: 8px; color: var(--text); }
  .idea-meta { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
  .pill {
    font-size: 9px; padding: 2px 7px; border-radius: 3px;
    text-transform: uppercase; letter-spacing: 0.5px; font-weight: 500;
  }
  .pill-pass { background: rgba(166,227,161,0.15); color: var(--pass); border: 1px solid rgba(166,227,161,0.3); }
  .pill-warn { background: rgba(249,226,175,0.15); color: var(--warn); border: 1px solid rgba(249,226,175,0.3); }
  .pill-fail { background: rgba(243,139,168,0.15); color: var(--fail); border: 1px solid rgba(243,139,168,0.3); }
  .pill-skip { background: rgba(69,71,90,0.3); color: var(--text2); border: 1px solid var(--border2); }
  .score-badge { font-size: 11px; font-weight: 600; color: var(--blue); }

  /* ── Detail Panel ── */
  .detail { overflow-y: auto; padding: 24px; background: var(--bg); }
  .empty-state {
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    height: 100%; color: var(--text3); gap: 8px;
  }
  .empty-state .icon { font-size: 32px; }
  .empty-state p { font-size: 11px; letter-spacing: 1px; text-transform: uppercase; }

  .report-title { font-size: 16px; font-weight: 600; color: var(--text); margin-bottom: 4px; line-height: 1.3; }
  .report-meta { color: var(--text2); font-size: 10px; margin-bottom: 20px; }

  /* ── Score Rings ── */
  .rings-row { display: flex; gap: 16px; flex-wrap: wrap; margin-bottom: 24px; }
  .ring-wrap {
    display: flex; flex-direction: column; align-items: center; gap: 4px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 14px 16px;
    min-width: 90px;
  }
  .ring-val { font-size: 18px; font-weight: 600; line-height: 1; }
  .ring-lbl { font-size: 9px; color: var(--text2); text-transform: uppercase; letter-spacing: 1px; text-align: center; }

  /* ── Domain Cards ── */
  .domains-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 12px; margin-bottom: 24px; }
  .domain-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 16px;
  }
  .domain-card.card-pass { border-color: rgba(166,227,161,0.3); }
  .domain-card.card-warn { border-color: rgba(249,226,175,0.3); }
  .domain-card.card-fail { border-color: rgba(243,139,168,0.3); }
  .domain-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
  .domain-name { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; }
  .domain-score { font-size: 13px; font-weight: 600; }
  .domain-fidelity { font-size: 9px; color: var(--text3); margin-bottom: 10px; }

  .metrics-list { display: flex; flex-direction: column; gap: 4px; margin-bottom: 10px; }
  .metric-row { display: flex; justify-content: space-between; align-items: center; padding: 3px 0; border-bottom: 1px solid var(--border); }
  .metric-row:last-child { border-bottom: none; }
  .metric-k { color: var(--text2); font-size: 10px; }
  .metric-v { font-size: 10px; font-weight: 500; }
  .metric-v.red { color: var(--fail); }
  .metric-v.yel { color: var(--warn); }
  .metric-v.grn { color: var(--pass); }

  .notes-list { display: flex; flex-direction: column; gap: 4px; margin-top: 8px; }
  .note-item { font-size: 10px; color: var(--text2); padding: 4px 8px; border-left: 2px solid var(--border2); line-height: 1.4; }
  .note-item.critical { border-left-color: var(--fail); color: var(--fail); }
  .note-item.warn { border-left-color: var(--warn); color: var(--warn); }

  /* ── Step Timeline ── */
  .timeline { margin-bottom: 24px; }
  .timeline-title { font-size: 9px; text-transform: uppercase; letter-spacing: 2px; color: var(--text3); margin-bottom: 12px; }
  .steps { display: flex; gap: 0; flex-wrap: wrap; }
  .step {
    display: flex; flex-direction: column; align-items: center; gap: 4px;
    padding: 10px 14px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-right: none;
    min-width: 80px;
    position: relative;
  }
  .step:first-child { border-radius: 6px 0 0 6px; }
  .step:last-child { border-right: 1px solid var(--border); border-radius: 0 6px 6px 0; }
  .step.active-pass { background: rgba(166,227,161,0.08); border-color: rgba(166,227,161,0.3); }
  .step.active-warn { background: rgba(249,226,175,0.08); border-color: rgba(249,226,175,0.3); }
  .step.active-fail { background: rgba(243,139,168,0.08); border-color: rgba(243,139,168,0.3); }
  .step.skipped { opacity: 0.35; }
  .step-num { font-size: 9px; color: var(--text3); }
  .step-name { font-size: 9px; text-align: center; color: var(--text2); text-transform: uppercase; letter-spacing: 0.5px; }
  .step-status { font-size: 8px; font-weight: 600; text-transform: uppercase; }

  /* ── Insights ── */
  .insights-section { margin-bottom: 24px; }
  .section-title { font-size: 9px; text-transform: uppercase; letter-spacing: 2px; color: var(--text3); margin-bottom: 10px; }
  .insight-item { padding: 8px 12px; background: var(--surface); border: 1px solid var(--border); border-radius: 4px; margin-bottom: 6px; font-size: 10px; color: var(--text2); line-height: 1.5; }
  .critical-item { border-left: 3px solid var(--fail); color: var(--fail); }
  .warn-item { border-left: 3px solid var(--warn); }

  /* ── Loading ── */
  .loading {
    display: flex; align-items: center; justify-content: center;
    height: 200px; color: var(--text3); font-size: 11px; letter-spacing: 2px;
  }
  @keyframes pulse { 0%,100% { opacity: 0.4; } 50% { opacity: 1; } }
  .loading { animation: pulse 1.5s infinite; }

  /* ── Scrollbar ── */
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: var(--surface); }
  ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }

  @media (max-width: 768px) {
    .content { grid-template-columns: 1fr; }
    .sidebar { height: 200px; }
  }
</style>
</head>

    </div>
    <div class="header-right">
      <span class="last-updated" id="last-updated">—</span>
      <button class="refresh-btn" onclick="loadData()">↻ Refresh</button>
    </div>
  </header>

  <div class="stats-bar" id="stats-bar">
    <div class="stat blue"><div class="val" id="s-total">—</div><div class="lbl">Simulated</div></div>
    <div class="divider"></div>
    <div class="stat pass"><div class="val" id="s-pass">—</div><div class="lbl">Pass</div></div>
    <div class="stat warn"><div class="val" id="s-warn">—</div><div class="lbl">Warning</div></div>
    <div class="stat fail"><div class="val" id="s-fail">—</div><div class="lbl">Critical/Fail</div></div>
    <div class="divider"></div>
    <div class="stat purple"><div class="val" id="s-avg">—</div><div class="lbl">Avg Score</div></div>
  </div>

  <div class="content">
    <div class="sidebar">
      <div class="sidebar-title">Simulated Ideas</div>
      <div id="sidebar-list"><div class="loading">Loading...</div></div>
    </div>
    <div class="detail" id="detail">
      <div class="empty-state">
        <div class="icon">⚛</div>
        <p>Select an idea to view simulation results</p>
      </div>
    </div>
  </div>
</div>

<script>
let SUPABASE_URL = '';
let SUPABASE_KEY = '';
let allResults = [];
let selectedIdx = -1;

// ── Load saved config ──
window.onload = () => {
  const url = localStorage.getItem('sim_sb_url');
  const key = localStorage.getItem('sim_sb_key');
  if (url && key) {
    document.getElementById('sb-url').value = url;
    document.getElementById('sb-key').value = key;
  }
};

async function connect() {
  const url = document.getElementById('sb-url').value.trim();
  const key = document.getElementById('sb-key').value.trim();
  const err = document.getElementById('error-msg');

  if (!url || !key) { showErr('Please enter both URL and key'); return; }

  SUPABASE_URL = url.replace(/\/$/, '');
  SUPABASE_KEY = key;

  try {
    const res = await sbFetch('sim_results?select=sim_id&limit=1');
    if (!res.ok) throw new Error('Connection failed: ' + res.status);
    localStorage.setItem('sim_sb_url', url);
    localStorage.setItem('sim_sb_key', key);
    document.getElementById('config-panel').style.display = 'none';
    document.getElementById('app').style.display = 'block';
    await loadData();
  } catch(e) {
    showErr(e.message);
  }
}

function showErr(msg) {
  const el = document.getElementById('error-msg');
  el.textContent = msg;
  el.style.display = 'block';
}

async function sbFetch(path) {
  return fetch(`${SUPABASE_URL}/rest/v1/${path}`, {
    headers: {
      'apikey': SUPABASE_KEY,
      'Authorization': `Bearer ${SUPABASE_KEY}`,
      'Content-Type': 'application/json',
    }
  });
}

async function loadData() {
  document.getElementById('sidebar-list').innerHTML = '<div class="loading">Loading...</div>';

  try {
    const res = await sbFetch('sim_results?select=*&order=created_at.desc&limit=50');
    if (!res.ok) throw new Error('Failed to load: ' + res.status);
    allResults = await res.json();

    updateStats();
    renderSidebar();
    document.getElementById('last-updated').textContent = 'Updated ' + new Date().toLocaleTimeString();

    if (allResults.length > 0 && selectedIdx === -1) {
      selectResult(0);
    }
  } catch(e) {
    document.getElementById('sidebar-list').innerHTML = `<div class="loading" style="color:var(--fail)">${e.message}</div>`;
  }
}

function updateStats() {
  const total = allResults.length;
  const pass  = allResults.filter(r => r.overall_status === 'pass').length;
  const warn  = allResults.filter(r => r.overall_status === 'warning').length;
  const fail  = allResults.filter(r => ['fail','critical'].includes(r.overall_status)).length;
  const scores = allResults.map(r => r.sim_score).filter(Boolean);
  const avg   = scores.length ? (scores.reduce((a,b) => a+b, 0) / scores.length).toFixed(1) : '—';

  document.getElementById('s-total').textContent = total;
  document.getElementById('s-pass').textContent  = pass;
  document.getElementById('s-warn').textContent  = warn;
  document.getElementById('s-fail').textContent  = fail;
  document.getElementById('s-avg').textContent   = avg;
}

function pillClass(status) {
  if (status === 'pass') return 'pill-pass';
  if (status === 'warning') return 'pill-warn';
  if (['fail','critical'].includes(status)) return 'pill-fail';
  return 'pill-skip';
}

function statusLabel(status) {
  const map = { pass: 'PASS', warning: 'WARNING', fail: 'FAIL', critical: 'CRITICAL', skipped: 'SKIP' };
  return map[status] || (status || 'UNKNOWN').toUpperCase();
}

function renderSidebar() {
  if (!allResults.length) {
    document.getElementById('sidebar-list').innerHTML = '<div class="loading">No simulations yet</div>';
    return;
  }
  document.getElementById('sidebar-list').innerHTML = allResults.map((r, i) => `
    <div class="idea-item ${i === selectedIdx ? 'active' : ''}" onclick="selectResult(${i})">
      <div class="idea-title">${r.idea_title || 'Untitled'}</div>
      <div class="idea-meta">
        <span class="pill ${pillClass(r.overall_status)}">${statusLabel(r.overall_status)}</span>
        <span class="score-badge">${(r.sim_score || 0).toFixed(1)}/10</span>
      </div>
    </div>
  `).join('');
}

function selectResult(idx) {
  selectedIdx = idx;
  renderSidebar();
  renderDetail(allResults[idx]);
}

function stepStatus(r, domain) {
  const domainMap = {
    'Workload': null,
    'Thermal': r.thermal_result,
    'PDN': r.pdn_result,
    'Coupled': r.thermal_result,
    'Electrical': r.electrical_result,
    'Aging': null,
    'Data Move': r.dm_result,
    'Monte Carlo': null,
  };
  const data = domainMap[domain];
  if (data === null) return 'skipped';
  if (!data) return 'skipped';
  return data.status || 'skipped';
}

function stepClass(status) {
  if (status === 'pass') return 'active-pass';
  if (status === 'warning') return 'active-warn';
  if (['fail','critical'].includes(status)) return 'active-fail';
  return 'skipped';
}

function stepColor(status) {
  if (status === 'pass') return 'var(--pass)';
  if (status === 'warning') return 'var(--warn)';
  if (['fail','critical'].includes(status)) return 'var(--fail)';
  return 'var(--text3)';
}

function cardClass(status) {
  if (status === 'pass') return 'card-pass';
  if (status === 'warning') return 'card-warn';
  if (['fail','critical'].includes(status)) return 'card-fail';
  return '';
}

function metricColor(k, v) {
  if (typeof v !== 'number') return '';
  if (k.includes('margin') || k.includes('pct')) {
    if (v < 0) return 'red';
    if (v < 15) return 'yel';
    return 'grn';
  }
  if (k.includes('runaway') || k.includes('risk')) return v ? 'red' : 'grn';
  return '';
}

function renderDomainCard(name, data) {
  if (!data) return '';
  const status = data.status || 'skipped';
  if (status === 'skipped') return '';

  const statusColor = status === 'pass' ? 'var(--pass)' : status === 'warning' ? 'var(--warn)' : 'var(--fail)';

  // Pick key metrics to display
  const skipKeys = new Set(['status', 'tier', 'notes', 'plot_path', 'time_s', 't_junction_transient',
    'hotspot_map', 'time_ms', 't_hotspot_transient', 'voltage_transient', 'time_ns',
    'freq_hz', 'impedance_mohm', 'pvt_corners', 'pvt_notes', 'noc_notes', 'distributions',
    'gate_yields', 'gate_failures', 'sweep_points']);

  const metrics = Object.entries(data)
    .filter(([k, v]) => !skipKeys.has(k) && v !== null && v !== undefined && typeof v !== 'object')
    .slice(0, 10);

  const metricsHtml = metrics.map(([k, v]) => {
    const vStr = typeof v === 'number'
      ? (Math.abs(v) > 1000 ? v.toFixed(0) : Math.abs(v) < 0.01 ? v.toExponential(2) : v.toFixed(2))
      : String(v);
    const col = metricColor(k, v);
    return `<div class="metric-row">
      <span class="metric-k">${k.replace(/_/g,' ')}</span>
      <span class="metric-v ${col}">${vStr}</span>
    </div>`;
  }).join('');

  const notes = data.notes || [];
  const notesHtml = notes.slice(0,3).map(n => {
    const isCrit = /EXCEED|VIOLAT|RUNAWAY|FAIL|CRITICAL/i.test(n);
    const isWarn = /WARNING|RISK|MARGIN/i.test(n);
    return `<div class="note-item ${isCrit ? 'critical' : isWarn ? 'warn' : ''}">${n}</div>`;
  }).join('');

  return `
    <div class="domain-card ${cardClass(status)}">
      <div class="domain-header">
        <span class="domain-name" style="color:${statusColor}">${name}</span>
        <span class="domain-score" style="color:${statusColor}">${statusLabel(status)}</span>
      </div>
      <div class="metrics-list">${metricsHtml}</div>
      ${notes.length ? `<div class="notes-list">${notesHtml}</div>` : ''}
    </div>`;
}

function renderDetail(r) {
  const detail = document.getElementById('detail');

  const steps = [
    { num: 1, name: 'Workload\nTrace' },
    { num: 2, name: 'Thermal\n1D+2D' },
    { num: 3, name: 'PDN\nRLC+SSN' },
    { num: 4, name: 'Coupled\nSolver' },
    { num: 5, name: 'Electrical\nCMOS+PVT' },
    { num: 6, name: 'Aging\nNBTI+EM' },
    { num: 7, name: 'Data\nMovement' },
    { num: 8, name: 'Monte\nCarlo' },
  ];

  const domainData = {
    thermal:    r.thermal_result,
    pdn:        r.pdn_result,
    electrical: r.electrical_result,
    data_move:  r.dm_result,
  };

  // Infer step statuses
  const stepStatuses = [
    r.thermal_result ? 'pass' : 'skipped',      // workload (approximated)
    r.thermal_result?.status || 'skipped',
    r.pdn_result?.status || 'skipped',
    r.thermal_result ? 'pass' : 'skipped',       // coupled (approximated)
    r.electrical_result?.status || 'skipped',
    'skipped',                                     // aging
    r.dm_result?.status || 'skipped',
    'skipped',                                     // monte carlo
  ];

  const stepsHtml = steps.map((s, i) => {
    const st = stepStatuses[i];
    return `
      <div class="step ${stepClass(st)}">
        <span class="step-num">${s.num}</span>
        <span class="step-name" style="white-space:pre">${s.name}</span>
        <span class="step-status" style="color:${stepColor(st)}">${st === 'skipped' ? '—' : statusLabel(st)}</span>
      </div>`;
  }).join('');

  const domainsHtml = [
    renderDomainCard('Thermal', r.thermal_result),
    renderDomainCard('PDN', r.pdn_result),
    renderDomainCard('Electrical', r.electrical_result),
    renderDomainCard('Data Movement', r.dm_result),
  ].join('');

  const criticals = r.critical_failures || [];
  const insights  = r.key_insights || [];
  const warnings  = r.warnings || [];

  const criticalsHtml = criticals.map(c => `<div class="insight-item critical-item">${c}</div>`).join('');
  const warningsHtml  = warnings.slice(0,5).map(w => `<div class="insight-item warn-item">${w}</div>`).join('');
  const insightsHtml  = insights.slice(0,5).map(i => `<div class="insight-item">${i}</div>`).join('');

  const overallColor = r.overall_status === 'pass' ? 'var(--pass)' : r.overall_status === 'warning' ? 'var(--warn)' : 'var(--fail)';
  const created = r.created_at ? new Date(r.created_at).toLocaleString() : '—';
  const duration = r.duration_ms ? `${(r.duration_ms/1000).toFixed(1)}s` : '—';

  detail.innerHTML = `
    <div class="report-title">${r.idea_title || 'Untitled'}</div>
    <div class="report-meta">${r.idea_id || ''} · ${created} · ${duration}</div>

    <div class="rings-row">
      <div class="ring-wrap">
        <canvas id="ring-main" width="70" height="70"></canvas>
        <span class="ring-val" style="color:${overallColor}">${(r.sim_score || 0).toFixed(1)}</span>
        <span class="ring-lbl">Overall</span>
      </div>
      ${r.thermal_result ? `<div class="ring-wrap">
        <canvas id="ring-th" width="70" height="70"></canvas>
        <span class="ring-val" style="color:var(--teal)">Thermal</span>
        <span class="ring-lbl">${statusLabel(r.thermal_result.status)}</span>
      </div>` : ''}
      ${r.pdn_result ? `<div class="ring-wrap">
        <canvas id="ring-pdn" width="70" height="70"></canvas>
        <span class="ring-val" style="color:var(--purple)">PDN</span>
        <span class="ring-lbl">${statusLabel(r.pdn_result.status)}</span>
      </div>` : ''}
      ${r.electrical_result ? `<div class="ring-wrap">
        <canvas id="ring-el" width="70" height="70"></canvas>
        <span class="ring-val" style="color:var(--blue)">Elec</span>
        <span class="ring-lbl">${statusLabel(r.electrical_result.status)}</span>
      </div>` : ''}
      ${r.dm_result ? `<div class="ring-wrap">
        <canvas id="ring-dm" width="70" height="70"></canvas>
        <span class="ring-val" style="color:var(--warn)">Data</span>
        <span class="ring-lbl">${statusLabel(r.dm_result.status)}</span>
      </div>` : ''}
    </div>

    <div class="timeline">
      <div class="timeline-title">Simulation Pipeline — 8 Steps</div>
      <div class="steps">${stepsHtml}</div>
    </div>

    ${criticals.length ? `<div class="insights-section">
      <div class="section-title">⚠ Critical Failures</div>
      ${criticalsHtml}
    </div>` : ''}

    ${warnings.length ? `<div class="insights-section">
      <div class="section-title">Warnings</div>
      ${warningsHtml}
    </div>` : ''}

    <div class="domains-grid">${domainsHtml || '<div class="insight-item">No detailed domain data available</div>'}</div>

    ${insights.length ? `<div class="insights-section">
      <div class="section-title">Key Insights</div>
      ${insightsHtml}
    </div>` : ''}
  `;

  // Draw main ring
  drawRing('ring-main', r.sim_score || 0, r.overall_status);
  if (r.thermal_result)   drawRingStatus('ring-th',  r.thermal_result.status, 'var(--teal)');
  if (r.pdn_result)       drawRingStatus('ring-pdn', r.pdn_result.status, 'var(--purple)');
  if (r.electrical_result)drawRingStatus('ring-el',  r.electrical_result.status, 'var(--blue)');
  if (r.dm_result)        drawRingStatus('ring-dm',  r.dm_result.status, 'var(--warn)');
}

function drawRing(id, score, status) {
  const canvas = document.getElementById(id);
  if (!canvas) return;
  const ctx = canvas.getContext('2d');
  const cx = 35, cy = 35, r = 28, lw = 5;
  const col = status === 'pass' ? '#a6e3a1' : status === 'warning' ? '#f9e2af' : '#f38ba8';
  const angle = (Math.min(score, 10) / 10) * 2 * Math.PI;
  ctx.clearRect(0,0,70,70);
  ctx.beginPath(); ctx.arc(cx, cy, r, 0, Math.PI*2);
  ctx.strokeStyle = '#1e2433'; ctx.lineWidth = lw; ctx.stroke();
  ctx.beginPath(); ctx.arc(cx, cy, r, -Math.PI/2, -Math.PI/2 + angle);
  ctx.strokeStyle = col; ctx.lineWidth = lw; ctx.lineCap = 'round'; ctx.stroke();
}

function drawRingStatus(id, status, color) {
  const canvas = document.getElementById(id);
  if (!canvas) return;
  const ctx = canvas.getContext('2d');
  const cx = 35, cy = 35, r = 28, lw = 5;
  const score = status === 'pass' ? 9 : status === 'warning' ? 6 : status === 'skipped' ? 0 : 3;
  const angle = (score / 10) * 2 * Math.PI;
  const col = status === 'pass' ? '#a6e3a1' : status === 'warning' ? '#f9e2af' : status === 'skipped' ? '#1e2433' : '#f38ba8';
  ctx.clearRect(0,0,70,70);
  ctx.beginPath(); ctx.arc(cx, cy, r, 0, Math.PI*2);
  ctx.strokeStyle = '#1e2433'; ctx.lineWidth = lw; ctx.stroke();
  if (score > 0) {
    ctx.beginPath(); ctx.arc(cx, cy, r, -Math.PI/2, -Math.PI/2 + angle);
    ctx.strokeStyle = col; ctx.lineWidth = lw; ctx.lineCap = 'round'; ctx.stroke();
  }
}
</script>
